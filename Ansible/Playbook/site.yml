---
- name: Install Clickhouse
  hosts: clickhouse
  vars:
    clickhouse_version: "23.3.3.44"
    clickhouse_packages:
      - clickhouse-client
      - clickhouse-server

  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted

  tasks:
    - block:
        - name: Get clickhouse distrib
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.noarch.rpm"
            dest: "/tmp/{{ item }}-{{ clickhouse_version }}.rpm"
            mode: '0644'
          loop: "{{ clickhouse_packages }}"
      rescue:
        - name: Get clickhouse distrib (fallback)
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/rpm/stable/clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm"
            dest: "/tmp/clickhouse-common-static-{{ clickhouse_version }}.rpm"
            mode: '0644'

    - name: Install clickhouse packages on Ubuntu
      become: true
      ansible.builtin.apt:
        deb: "/tmp/{{ item }}_{{ clickhouse_version }}_amd64.deb"
      loop:
        - clickhouse-common-static
        - clickhouse-client
        - clickhouse-server
      notify: Start clickhouse service


    - name: Flush handlers
      meta: flush_handlers

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install and configure Vector
  hosts: vector_servers
  become: true
  vars:
    vector_version: "0.40.0"
    vector_archive: "vector-{{ vector_version }}-x86_64-unknown-linux-musl.tar.gz"
    vector_download_url: "https://github.com{{ vector_version }}/{{ vector_archive }}"
    vector_install_dir: "/opt/vector"
    vector_bin_dir: "/usr/local/bin"
    vector_config_dir: "/etc/vector"

  handlers:
    - name: Restart vector service
      ansible.builtin.systemd:
        name: vector
        state: restarted

  tasks:
    - name: Ensure configuration directory exists
      ansible.builtin.file:
        path: "{{ vector_config_dir }}"
        state: directory
        mode: '0755'

    - name: Download Vector archive
      ansible.builtin.get_url:
        url: "{{ vector_download_url }}"
        dest: "/tmp/{{ vector_archive }}"
        mode: '0644'

    - name: Extract Vector archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ vector_archive }}"
        dest: "/tmp"
        remote_src: true

    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ vector_install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Vector binary to install directory
      ansible.builtin.copy:
        src: "/tmp/vector-x86_64-unknown-linux-musl/bin/vector"
        dest: "{{ vector_install_dir }}/vector"
        mode: '0755'
        remote_src: true

    - name: Create symlink to binary directory
      ansible.builtin.file:
        src: "{{ vector_install_dir }}/vector"
        dest: "{{ vector_bin_dir }}/vector"
        state: link

    - name: Deploy Vector configuration from template
      ansible.builtin.template:
        src: templates/vector.toml.j2
        dest: "{{ vector_config_dir }}/vector.toml"
        mode: '0644'
      notify: Restart vector service

    - name: Create systemd service for Vector
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        mode: '0644'
        content: |
          [Unit]
          Description=Vector Log Agent
          After=network.target

          [Service]
          ExecStart={{ vector_bin_dir }}/vector --config {{ vector_config_dir }}/vector.toml
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      notify: Restart vector service

    - name: Ensure Vector service is started and enabled
      ansible.builtin.systemd:
        name: vector
        state: started
        enabled: true
        daemon_reload: true
