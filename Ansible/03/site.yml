---
- name: Install Clickhouse
  hosts: clickhouse
  vars:
    clickhouse_version: "23.3.8.21"
    clickhouse_packages:
      - clickhouse-client
      - clickhouse-server
      - clickhouse-common-static

  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted

  tasks:
    - name: Group Clickhouse installation tasks
      block:
        - name: Download Clickhouse DEB packages
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/clickhouse/{{ item }}_{{ clickhouse_version }}_amd64.deb"
            dest: "/tmp/{{ item }}_{{ clickhouse_version }}_amd64.deb"
            mode: '0644'
          loop: "{{ clickhouse_packages }}"
      rescue:
        - name: Download Clickhouse DEB packages (fallback for architecture independent)
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/clickhouse/{{ item }}_{{ clickhouse_version }}_all.deb"
            dest: "/tmp/{{ item }}_{{ clickhouse_version }}_all.deb"
            mode: '0644'
          loop: "{{ clickhouse_packages }}"

    - name: Install clickhouse packages on Ubuntu
      become: true
      ansible.builtin.apt:
        deb: "{{ item }}"
      loop:
        - "/tmp/clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
        - "/tmp/clickhouse-client_{{ clickhouse_version }}_amd64.deb"
        - "/tmp/clickhouse-server_{{ clickhouse_version }}_amd64.deb"
      notify: Start clickhouse service

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install and configure Vector
  hosts: vector_servers
  become: true
  vars:
    vector_version: "0.40.0"
    vector_archive: "vector-0.40.0-x86_64-unknown-linux-musl.tar.gz"
    vector_download_url: "https://github.com/vectordotdev/vector/releases/download/v0.40.0/{{ vector_archive }}"
    vector_install_dir: "/opt/vector"
    vector_bin_dir: "/usr/local/bin"
    vector_config_dir: "/etc/vector"

  handlers:
    - name: Restart vector service
      ansible.builtin.systemd:
        name: vector
        state: restarted

  tasks:
    - name: Ensure configuration directory exists
      ansible.builtin.file:
        path: "{{ vector_config_dir }}"
        state: directory
        mode: '0755'

    - name: Download Vector archive # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: "curl -L -o /tmp/{{ vector_archive }} {{ vector_download_url }}"
        creates: "/tmp/{{ vector_archive }}"


    - name: Extract Vector archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ vector_archive }}"
        dest: "/tmp"
        remote_src: true

    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ vector_install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Vector binary to install directory
      ansible.builtin.copy:
        src: "/tmp/vector-x86_64-unknown-linux-musl/bin/vector"
        dest: "{{ vector_install_dir }}/vector"
        mode: '0755'
        remote_src: true

    - name: Create symlink to binary directory
      ansible.builtin.file:
        src: "{{ vector_install_dir }}/vector"
        dest: "{{ vector_bin_dir }}/vector"
        state: link

    - name: Ensure vector data directory exists
      ansible.builtin.file:
        path: "/var/lib/vector"
        state: directory
        mode: '0755'

    - name: Deploy Vector configuration from template
      ansible.builtin.template:
        src: templates/vector.toml.j2
        dest: "{{ vector_config_dir }}/vector.toml"
        mode: '0644'
      notify: Restart vector service

    - name: Create systemd service for Vector
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        mode: '0644'
        content: |
          [Unit]
          Description=Vector Log Agent
          After=network.target

          [Service]
          ExecStart={{ vector_bin_dir }}/vector --config {{ vector_config_dir }}/vector.toml
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      notify: Restart vector service

    - name: Ensure Vector service is started and enabled
      ansible.builtin.systemd:
        name: vector
        state: started
        enabled: true
        daemon_reload: true

- name: Install and configure LightHouse
  hosts: lighthouse
  become: true
  vars:
    lighthouse_dir: "/var/www/lighthouse"

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  tasks:
    - name: Install Nginx web server
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Install unzip package
      ansible.builtin.apt:
        name: unzip
        state: present

    - name: Ensure LightHouse directory exists
      ansible.builtin.file:
        path: "{{ lighthouse_dir }}"
        state: directory
        mode: '0755'

    - name: Download LightHouse archive
      ansible.builtin.get_url:
        url: "https://github.com/VKCOM/lighthouse/archive/refs/heads/master.zip"
        dest: "/tmp/lighthouse.zip"
        mode: '0644'

    - name: Extract LightHouse static files
      ansible.builtin.unarchive:
        src: "/tmp/lighthouse.zip"
        dest: "{{ lighthouse_dir }}"
        remote_src: true
        extra_opts: ['-j']
        creates: "{{ lighthouse_dir }}/index.html"

    - name: Deploy Nginx configuration for LightHouse
      ansible.builtin.template:
        src: templates/lighthouse.conf.j2
        dest: /etc/nginx/sites-available/lighthouse.conf
        mode: '0644'
      notify: Reload nginx

    - name: Enable LightHouse Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/lighthouse.conf
        dest: /etc/nginx/sites-enabled/lighthouse.conf
        state: link
      notify: Reload nginx

    - name: Remove default Nginx site configuration
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure Nginx service is running and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
